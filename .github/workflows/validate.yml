name: Validate

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/bank-app

      - name: Render chart
        run: helm template bank-app helm/bank-app
