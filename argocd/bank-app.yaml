apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bank-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AstralUniverse1/bank-gitops.git
    targetRevision: main
    path: helm/bank-app
    helm:
      releaseName: bank-app
  destination:
    server: https://kubernetes.default.svc
    namespace: bank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
